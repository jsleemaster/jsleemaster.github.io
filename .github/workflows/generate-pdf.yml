name: Generate PDF Resume

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'resume/resume.pdf'
      - 'README.md'

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PDF verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji poppler-utils

      - name: Install dependencies
        run: npm ci

      - name: Generate PDF
        run: npm run generate-pdf

      - name: Verify PDF output
        run: npm run verify-pdf

      - name: Check public links
        run: npm run check-links

      - name: Commit and Push PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add resume/resume.pdf
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update resume.pdf [skip ci]"
            git push
          fi
